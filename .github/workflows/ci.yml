name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run checks (format, lint, type-check, tests)
        # check.sh runs `uv sync --frozen`, which provisions Python 3.13 per
        # .python-version, then ruff format --check, ruff check, pyright, pytest.
        run: ./scripts/check.sh
